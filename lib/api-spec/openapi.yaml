openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tajikistan Premium Transportation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
  - name: vehicles
    description: Vehicle operations
  - name: blog
    description: Blog operations
  - name: tours
    description: Tour operations
  - name: admin
    description: Admin authentication
  - name: storage
    description: Object storage upload and serving endpoints
  - name: site-settings
    description: Global site content + contact settings
paths:
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /site-settings:
    get:
      tags: [site-settings]
      operationId: getSiteSettings
      summary: Get global site settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
    put:
      tags: [site-settings]
      operationId: updateSiteSettings
      summary: Update global site settings (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteSettingsInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Submit a booking
      description: Saves booking to DB and sends Telegram notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a vehicle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get a vehicle by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update a vehicle (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete a vehicle (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicles/{id}/status:
    patch:
      operationId: updateVehicleStatus
      tags: [vehicles]
      summary: Update vehicle status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleStatusUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List all blog posts
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Blog post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog/by-slug/{slug}:
    get:
      operationId: getBlogPostBySlug
      tags: [blog]
      summary: Get blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog/{id}:
    put:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "200":
          description: Updated blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tour-bookings:
    post:
      operationId: createTourBooking
      tags: [tours]
      summary: Create a tour booking request (sends Telegram notification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourBookingInput"
      responses:
        "201":
          description: Tour booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tours:
    get:
      operationId: listTours
      tags: [tours]
      summary: List all tours
      responses:
        "200":
          description: List of tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tour"
    post:
      operationId: createTour
      tags: [tours]
      summary: Create a tour (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourInput"
      responses:
        "201":
          description: Tour created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tours/by-slug/{slug}:
    get:
      operationId: getTourBySlug
      tags: [tours]
      summary: Get tour by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tours/{id}:
    put:
      operationId: updateTour
      tags: [tours]
      summary: Update a tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TourInput"
      responses:
        "200":
          description: Updated tour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tour"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTour
      tags: [tours]
      summary: Delete a tour (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/verify:
    get:
      operationId: adminVerify
      tags: [admin]
      summary: Verify admin token
      responses:
        "200":
          description: Token validity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVerifyResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    BookingInput:
      type: object
      required:
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 7
        pickup:
          type: string
          minLength: 2
        destination:
          type: string
          minLength: 2
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
          minimum: 1
          maximum: 20
        notes:
          type: ["string", "null"]

    Booking:
      type: object
      required:
        - id
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
        - createdAt
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        pickup:
          type: string
        destination:
          type: string
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
        notes:
          type: ["string", "null"]
        tourSlug:
          type: ["string", "null"]
        tourTitle:
          type: ["string", "null"]
        createdAt:
          type: string

    TourBookingInput:
      type: object
      required:
        - fullName
        - phone
        - passengers
        - date
        - pickup
        - tourSlug
        - tourTitle
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 5
        passengers:
          type: integer
          minimum: 1
        date:
          type: string
          minLength: 1
        pickup:
          type: string
          minLength: 2
        notes:
          type: string
        tourSlug:
          type: string
          minLength: 1
        tourTitle:
          type: string
          minLength: 1

    LangMap:
      type: object
      description: Optional translations keyed by language code (en uses the base column).
      properties:
        ru: { type: string }
        tj: { type: string }
        uz: { type: string }

    LocalizedString:
      description: Either a plain string (legacy / EN-only) or a per-language object.
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
          properties:
            en: { type: string }
            ru: { type: string }
            tj: { type: string }
            uz: { type: string }

    SiteSettings:
      type: object
      required:
        - id
        - heroEyebrow
        - heroTitleLine1
        - heroTitleLine2
        - heroSubtitle
        - heroBackgroundImage
        - contactPhone
        - contactWhatsapp
        - contactTelegram
        - contactEmail
        - contactAddress
        - contactMapsUrl
        - footerTagline
        - updatedAt
      properties:
        id: { type: integer }
        heroEyebrow: { type: string }
        heroEyebrowI18n: { $ref: "#/components/schemas/LangMap" }
        heroTitleLine1: { type: string }
        heroTitleLine1I18n: { $ref: "#/components/schemas/LangMap" }
        heroTitleLine2: { type: string }
        heroTitleLine2I18n: { $ref: "#/components/schemas/LangMap" }
        heroSubtitle: { type: string }
        heroSubtitleI18n: { $ref: "#/components/schemas/LangMap" }
        heroBackgroundImage: { type: string }
        contactPhone: { type: string }
        contactWhatsapp: { type: string }
        contactTelegram: { type: string }
        contactEmail: { type: string }
        contactAddress: { type: string }
        contactAddressI18n: { $ref: "#/components/schemas/LangMap" }
        contactMapsUrl: { type: string }
        footerTagline: { type: string }
        footerTaglineI18n: { $ref: "#/components/schemas/LangMap" }
        updatedAt: { type: string }

    SiteSettingsInput:
      type: object
      properties:
        heroEyebrow: { type: string }
        heroEyebrowI18n: { $ref: "#/components/schemas/LangMap" }
        heroTitleLine1: { type: string }
        heroTitleLine1I18n: { $ref: "#/components/schemas/LangMap" }
        heroTitleLine2: { type: string }
        heroTitleLine2I18n: { $ref: "#/components/schemas/LangMap" }
        heroSubtitle: { type: string }
        heroSubtitleI18n: { $ref: "#/components/schemas/LangMap" }
        heroBackgroundImage: { type: string }
        contactPhone: { type: string }
        contactWhatsapp: { type: string }
        contactTelegram: { type: string }
        contactEmail: { type: string }
        contactAddress: { type: string }
        contactAddressI18n: { $ref: "#/components/schemas/LangMap" }
        contactMapsUrl: { type: string }
        footerTagline: { type: string }
        footerTaglineI18n: { $ref: "#/components/schemas/LangMap" }

    VehicleStatus:
      type: string
      enum:
        - available
        - reserved
        - busy
        - hidden

    Vehicle:
      type: object
      required:
        - id
        - code
        - name
        - model
        - year
        - type
        - pax
        - pricePerDay
        - description
        - features
        - mainImage
        - gallery
        - bookingVisible
        - sortOrder
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        model:
          type: string
        year:
          type: integer
        type:
          type: string
        pax:
          type: integer
        pricePerDay:
          type: integer
        description:
          type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/LocalizedString"
        mainImage:
          type: string
        gallery:
          type: array
          items:
            type: string
        bookingVisible:
          type: boolean
        sortOrder:
          type: integer
        status:
          $ref: "#/components/schemas/VehicleStatus"
        nameI18n: { $ref: "#/components/schemas/LangMap" }
        modelI18n: { $ref: "#/components/schemas/LangMap" }
        typeI18n: { $ref: "#/components/schemas/LangMap" }
        descriptionI18n: { $ref: "#/components/schemas/LangMap" }
        createdAt:
          type: string
        updatedAt:
          type: string

    VehicleInput:
      type: object
      required:
        - code
        - model
        - type
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
        model:
          type: string
          minLength: 1
        year:
          type: integer
          minimum: 1990
          maximum: 2099
        type:
          type: string
          minLength: 1
        pax:
          type: integer
          minimum: 1
          maximum: 50
        pricePerDay:
          type: integer
          minimum: 0
        description:
          type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/LocalizedString"
        mainImage:
          type: string
        gallery:
          type: array
          items:
            type: string
        bookingVisible:
          type: boolean
        sortOrder:
          type: integer
        status:
          $ref: "#/components/schemas/VehicleStatus"
        nameI18n: { $ref: "#/components/schemas/LangMap" }
        modelI18n: { $ref: "#/components/schemas/LangMap" }
        typeI18n: { $ref: "#/components/schemas/LangMap" }
        descriptionI18n: { $ref: "#/components/schemas/LangMap" }

    VehicleStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/VehicleStatus"

    BlogContentBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [paragraph, heading, quote, image]
        text:
          $ref: "#/components/schemas/LocalizedString"
        src:
          type: string
        caption:
          $ref: "#/components/schemas/LocalizedString"

    BlogPost:
      type: object
      required:
        - id
        - slug
        - title
        - excerpt
        - cover
        - gallery
        - location
        - date
        - readTime
        - author
        - category
        - content
        - published
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        cover:
          type: string
        gallery:
          type: array
          items:
            type: string
        location:
          type: string
        date:
          type: string
        readTime:
          type: string
        author:
          type: string
        category:
          type: string
        content:
          type: array
          items:
            $ref: "#/components/schemas/BlogContentBlock"
        published:
          type: boolean
        titleI18n: { $ref: "#/components/schemas/LangMap" }
        excerptI18n: { $ref: "#/components/schemas/LangMap" }
        locationI18n: { $ref: "#/components/schemas/LangMap" }
        readTimeI18n: { $ref: "#/components/schemas/LangMap" }
        authorI18n: { $ref: "#/components/schemas/LangMap" }
        categoryI18n: { $ref: "#/components/schemas/LangMap" }
        createdAt:
          type: string
        updatedAt:
          type: string

    BlogPostInput:
      type: object
      required:
        - slug
        - title
        - excerpt
        - cover
        - date
      properties:
        slug:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        excerpt:
          type: string
        cover:
          type: string
        gallery:
          type: array
          items:
            type: string
        location:
          type: string
        date:
          type: string
        readTime:
          type: string
        author:
          type: string
        category:
          type: string
        content:
          type: array
          items:
            $ref: "#/components/schemas/BlogContentBlock"
        published:
          type: boolean
        titleI18n: { $ref: "#/components/schemas/LangMap" }
        excerptI18n: { $ref: "#/components/schemas/LangMap" }
        locationI18n: { $ref: "#/components/schemas/LangMap" }
        readTimeI18n: { $ref: "#/components/schemas/LangMap" }
        authorI18n: { $ref: "#/components/schemas/LangMap" }
        categoryI18n: { $ref: "#/components/schemas/LangMap" }

    TourHighlight:
      type: object
      required: [title, body]
      properties:
        title:
          $ref: "#/components/schemas/LocalizedString"
        body:
          $ref: "#/components/schemas/LocalizedString"

    TourItineraryDay:
      type: object
      required: [day, title, body]
      properties:
        day:
          type: integer
        title:
          $ref: "#/components/schemas/LocalizedString"
        body:
          $ref: "#/components/schemas/LocalizedString"
        locations:
          type: array
          items: { $ref: "#/components/schemas/LocalizedString" }
        activities:
          type: array
          items: { $ref: "#/components/schemas/LocalizedString" }
        overnightLocation:
          $ref: "#/components/schemas/LocalizedString"
        images:
          type: array
          items: { type: string }

    Tour:
      type: object
      required:
        - id
        - slug
        - title
        - shortDescription
        - description
        - duration
        - startingPrice
        - route
        - mainImage
        - gallery
        - highlights
        - itinerary
        - included
        - featured
        - hidden
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        shortDescription: { type: string }
        description: { type: string }
        duration: { type: string }
        startingPrice: { type: integer }
        route: { type: string }
        mainImage: { type: string }
        gallery:
          type: array
          items: { type: string }
        highlights:
          type: array
          items: { $ref: "#/components/schemas/TourHighlight" }
        itinerary:
          type: array
          items: { $ref: "#/components/schemas/TourItineraryDay" }
        included:
          type: array
          items: { $ref: "#/components/schemas/LocalizedString" }
        featured: { type: boolean }
        hidden: { type: boolean }
        sortOrder: { type: integer }
        titleI18n: { $ref: "#/components/schemas/LangMap" }
        shortDescriptionI18n: { $ref: "#/components/schemas/LangMap" }
        descriptionI18n: { $ref: "#/components/schemas/LangMap" }
        durationI18n: { $ref: "#/components/schemas/LangMap" }
        routeI18n: { $ref: "#/components/schemas/LangMap" }
        createdAt: { type: string }
        updatedAt: { type: string }

    TourInput:
      type: object
      required:
        - slug
        - title
      properties:
        slug:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        shortDescription: { type: string }
        description: { type: string }
        duration: { type: string }
        startingPrice:
          type: integer
          minimum: 0
        route: { type: string }
        mainImage: { type: string }
        gallery:
          type: array
          items: { type: string }
        highlights:
          type: array
          items: { $ref: "#/components/schemas/TourHighlight" }
        itinerary:
          type: array
          items: { $ref: "#/components/schemas/TourItineraryDay" }
        included:
          type: array
          items: { $ref: "#/components/schemas/LocalizedString" }
        featured: { type: boolean }
        hidden: { type: boolean }
        sortOrder: { type: integer }
        titleI18n: { $ref: "#/components/schemas/LangMap" }
        shortDescriptionI18n: { $ref: "#/components/schemas/LangMap" }
        descriptionI18n: { $ref: "#/components/schemas/LangMap" }
        durationI18n: { $ref: "#/components/schemas/LangMap" }
        routeI18n: { $ref: "#/components/schemas/LangMap" }

    AdminLoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    AdminLoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    AdminVerifyResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
