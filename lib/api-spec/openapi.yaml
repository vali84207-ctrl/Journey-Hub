openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tajikistan Premium Transportation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Submit a booking
      description: Saves booking to DB and sends Telegram notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BookingInput:
      type: object
      required:
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 7
        pickup:
          type: string
          minLength: 2
        destination:
          type: string
          minLength: 2
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
          minimum: 1
          maximum: 20
        notes:
          type: ["string", "null"]

    Booking:
      type: object
      required:
        - id
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
        - createdAt
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        pickup:
          type: string
        destination:
          type: string
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
