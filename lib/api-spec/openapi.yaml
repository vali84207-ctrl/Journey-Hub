openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tajikistan Premium Transportation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
  - name: vehicles
    description: Vehicle operations
  - name: admin
    description: Admin authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Submit a booking
      description: Saves booking to DB and sends Telegram notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles with status
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}/status:
    patch:
      operationId: updateVehicleStatus
      tags: [vehicles]
      summary: Update vehicle status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleStatusUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/verify:
    get:
      operationId: adminVerify
      tags: [admin]
      summary: Verify admin token
      responses:
        "200":
          description: Token validity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVerifyResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BookingInput:
      type: object
      required:
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 7
        pickup:
          type: string
          minLength: 2
        destination:
          type: string
          minLength: 2
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
          minimum: 1
          maximum: 20
        notes:
          type: ["string", "null"]

    Booking:
      type: object
      required:
        - id
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
        - createdAt
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        pickup:
          type: string
        destination:
          type: string
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    VehicleStatus:
      type: string
      enum:
        - available
        - reserved
        - busy

    Vehicle:
      type: object
      required:
        - id
        - code
        - model
        - type
        - status
        - updatedAt
      properties:
        id:
          type: integer
        code:
          type: string
        model:
          type: string
        type:
          type: string
        status:
          $ref: "#/components/schemas/VehicleStatus"
        updatedAt:
          type: string

    VehicleStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/VehicleStatus"

    AdminLoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    AdminLoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    AdminVerifyResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
