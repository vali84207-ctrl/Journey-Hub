openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tajikistan Premium Transportation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
  - name: vehicles
    description: Vehicle operations
  - name: blog
    description: Blog operations
  - name: admin
    description: Admin authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Submit a booking
      description: Saves booking to DB and sends Telegram notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a vehicle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get a vehicle by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update a vehicle (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete a vehicle (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicles/{id}/status:
    patch:
      operationId: updateVehicleStatus
      tags: [vehicles]
      summary: Update vehicle status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleStatusUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Vehicle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List all blog posts
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Blog post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog/by-slug/{slug}:
    get:
      operationId: getBlogPostBySlug
      tags: [blog]
      summary: Get blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog/{id}:
    put:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "200":
          description: Updated blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/verify:
    get:
      operationId: adminVerify
      tags: [admin]
      summary: Verify admin token
      responses:
        "200":
          description: Token validity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVerifyResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BookingInput:
      type: object
      required:
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
      properties:
        fullName:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 7
        pickup:
          type: string
          minLength: 2
        destination:
          type: string
          minLength: 2
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
          minimum: 1
          maximum: 20
        notes:
          type: ["string", "null"]

    Booking:
      type: object
      required:
        - id
        - fullName
        - phone
        - pickup
        - destination
        - date
        - time
        - carType
        - passengers
        - createdAt
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        pickup:
          type: string
        destination:
          type: string
        date:
          type: string
        time:
          type: string
        carType:
          type: string
        passengers:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    VehicleStatus:
      type: string
      enum:
        - available
        - reserved
        - busy
        - hidden

    Vehicle:
      type: object
      required:
        - id
        - code
        - name
        - model
        - year
        - type
        - pax
        - pricePerDay
        - description
        - features
        - mainImage
        - gallery
        - bookingVisible
        - sortOrder
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        model:
          type: string
        year:
          type: integer
        type:
          type: string
        pax:
          type: integer
        pricePerDay:
          type: integer
        description:
          type: string
        features:
          type: array
          items:
            type: string
        mainImage:
          type: string
        gallery:
          type: array
          items:
            type: string
        bookingVisible:
          type: boolean
        sortOrder:
          type: integer
        status:
          $ref: "#/components/schemas/VehicleStatus"
        createdAt:
          type: string
        updatedAt:
          type: string

    VehicleInput:
      type: object
      required:
        - code
        - model
        - type
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
        model:
          type: string
          minLength: 1
        year:
          type: integer
          minimum: 1990
          maximum: 2099
        type:
          type: string
          minLength: 1
        pax:
          type: integer
          minimum: 1
          maximum: 50
        pricePerDay:
          type: integer
          minimum: 0
        description:
          type: string
        features:
          type: array
          items:
            type: string
        mainImage:
          type: string
        gallery:
          type: array
          items:
            type: string
        bookingVisible:
          type: boolean
        sortOrder:
          type: integer
        status:
          $ref: "#/components/schemas/VehicleStatus"

    VehicleStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/VehicleStatus"

    BlogContentBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [paragraph, heading, quote, image]
        text:
          type: string
        src:
          type: string
        caption:
          type: string

    BlogPost:
      type: object
      required:
        - id
        - slug
        - title
        - excerpt
        - cover
        - gallery
        - location
        - date
        - readTime
        - author
        - category
        - content
        - published
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        cover:
          type: string
        gallery:
          type: array
          items:
            type: string
        location:
          type: string
        date:
          type: string
        readTime:
          type: string
        author:
          type: string
        category:
          type: string
        content:
          type: array
          items:
            $ref: "#/components/schemas/BlogContentBlock"
        published:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    BlogPostInput:
      type: object
      required:
        - slug
        - title
        - excerpt
        - cover
        - date
      properties:
        slug:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        excerpt:
          type: string
        cover:
          type: string
        gallery:
          type: array
          items:
            type: string
        location:
          type: string
        date:
          type: string
        readTime:
          type: string
        author:
          type: string
        category:
          type: string
        content:
          type: array
          items:
            $ref: "#/components/schemas/BlogContentBlock"
        published:
          type: boolean

    AdminLoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    AdminLoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    AdminVerifyResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
